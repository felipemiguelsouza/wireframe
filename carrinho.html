<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <div class="header">
            HEADER <a href="https://wa.me/11992225025?text=Gostaria de Comprar este produto!">CONTATO</a>

            MENU
            <p>Esse campo é destinado à seleção por tipo...</p>
        </div>

        <div class="conteudo">
            <h2>Carrinho</h2>

            <div class="carrinho">

                <div class="item">
                    <img src="santacruz.jpg" alt="Produto">

                    <div class="info">
                        <h3>Shape Santa Cruz</h3>
                        <p>Preço: R$ 199,90</p>
                    </div>

                    <div class="quantidade">
                        <span>Qtd:</span>
                        <input type="number" value="1" min="1">
                    </div>

                    <div class="preco">
                        R$ 199,90
                    </div>
                </div>

                <div class="resumo">
                    <div class="total">

                    </div>

                    <div class="finalizar">
                        <a href="checkout.html" class="botao">Finalizar Compra</a>
                    </div>

            </div>
        </div>

        <div class="footer">
            © Todos os direitos reservados - Felipe Miguel 2026 - Fatec Cotia
        </div>

    </div>
